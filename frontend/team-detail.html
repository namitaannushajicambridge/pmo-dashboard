<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Detail — PRISM PMO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-enhancements.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-body);
            padding: 24px;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .team-icon-lg {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-main);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--primary-main);
            margin-left: auto;
            transition: all var(--transition-fast);
        }

        .back-btn:hover {
            background: rgba(99, 102, 241, 0.08);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .stat-box .val {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-box .lbl {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 1.2rem;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <div class="team-icon-lg"><i class="fas fa-users"></i></div>
            <div>
                <h1 id="teamName" style="font-size:1.5rem;font-weight:800;color:var(--text-primary)">Loading...</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px" id="teamIdLabel">Team ID: —</p>
            </div>
            <button class="back-btn" onclick="window.close()">
                <i class="fas fa-times"></i> Close Tab
            </button>
        </div>

        <div id="loadingState" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading team data...
        </div>

        <div id="teamContent" style="display:none">
            <!-- Stats Row -->
            <div class="grid-3" id="statsRow"></div>

            <!-- Projects Table -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-folder-open"></i> Team Projects</h2>
                </div>
                <div class="resource-table-container">
                    <table class="resource-table">
                        <thead>
                            <tr>
                                <th>Project Name</th>
                                <th>Status</th>
                                <th>Budget</th>
                                <th>Spent</th>
                                <th>Risk</th>
                                <th>Risk Reason</th>
                            </tr>
                        </thead>
                        <tbody id="teamProjectsBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Risk Summary -->
            <section class="section" style="margin-top:20px">
                <div class="section-header">
                    <h2><i class="fas fa-shield-alt"></i> Risk Summary</h2>
                </div>
                <div class="risk-grid" id="teamRiskGrid"></div>
            </section>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        function fmtCurrency(val) {
            if (val >= 1000000) return `$${(val / 1000000).toFixed(1)}M`;
            if (val >= 1000) return `$${(val / 1000).toFixed(0)}k`;
            return `$${val}`;
        }

        function getStatusBadge(status) {
            const map = {
                planned: { label: 'Planned', icon: 'fa-clock' },
                initiated: { label: 'Initiated', icon: 'fa-play-circle' },
                closed: { label: 'Closed', icon: 'fa-check-circle' },
                dropped: { label: 'Dropped', icon: 'fa-times-circle' },
                'to-be-initiated': { label: 'To Be Initiated', icon: 'fa-hourglass-start' },
            };
            const s = map[status] || { label: status, icon: 'fa-circle' };
            return `<span class="status-badge ${status}"><i class="fas ${s.icon}"></i> ${s.label}</span>`;
        }

        async function loadTeamDetail() {
            const params = new URLSearchParams(window.location.search);
            const teamId = params.get('teamId');
            const teamName = params.get('teamName') || 'Team Detail';

            document.title = `${teamName} — PRISM PMO`;
            document.getElementById('teamName').textContent = teamName;
            document.getElementById('teamIdLabel').textContent = `Team ID: ${teamId}`;

            try {
                const res = await fetch(`${API_BASE}/team/${teamId}`);
                if (!res.ok) throw new Error('Team not found');
                const data = await res.json();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('teamContent').style.display = 'block';

                // Stats
                const stats = [
                    { val: data.projects.length, lbl: 'Total Projects', color: 'var(--brand-blue)' },
                    { val: data.projects.filter(p => p.status === 'initiated').length, lbl: 'Active Projects', color: 'var(--status-initiated)' },
                    { val: data.projects.filter(p => p.risk === 'high').length, lbl: 'High Risk', color: 'var(--status-dropped)' },
                ];
                document.getElementById('statsRow').innerHTML = stats.map(s => `
            <div class="stat-box">
                <div class="val" style="color:${s.color}">${s.val}</div>
                <div class="lbl">${s.lbl}</div>
            </div>
        `).join('');

                // Projects
                const tbody = document.getElementById('teamProjectsBody');
                tbody.innerHTML = '';
                data.projects.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                <td><span class="project-name">${p.name}</span></td>
                <td>${getStatusBadge(p.status)}</td>
                <td>${fmtCurrency(p.budget)}</td>
                <td>${fmtCurrency(p.spent)}</td>
                <td><span class="status-badge ${p.risk === 'high' ? 'critical' : p.risk === 'medium' ? 'at-risk' : 'on-track'}">${p.risk}</span></td>
                <td>${p.riskReason || '—'}</td>
            `;
                    tbody.appendChild(tr);
                });

                // Risk grid
                document.getElementById('teamRiskGrid').innerHTML = `
            <div class="risk-stat"><div class="risk-number" style="color:var(--status-dropped)">${data.risk.high}</div><div class="risk-label">High Risk</div></div>
            <div class="risk-stat"><div class="risk-number" style="color:var(--status-delayed)">${data.risk.medium}</div><div class="risk-label">Medium Risk</div></div>
            <div class="risk-stat"><div class="risk-number" style="color:var(--status-closed)">${data.risk.low}</div><div class="risk-label">Low Risk</div></div>
            <div class="risk-stat"><div class="risk-number" style="color:var(--text-primary)">${data.projects.length}</div><div class="risk-label">Total</div></div>
        `;

            } catch (err) {
                document.getElementById('loadingState').innerHTML = `
            <div style="text-align:center;color:var(--status-dropped)">
                <i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:12px;display:block"></i>
                <strong>Could not load team data.</strong><br>
                <small>Make sure the backend server is running at ${API_BASE}</small>
            </div>
        `;
            }
        }

        loadTeamDetail();
    </script>
</body>

</html>
